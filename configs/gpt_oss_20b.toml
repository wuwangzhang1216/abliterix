non_interactive = true

# GPT-OSS-20B (MoE) steering config — RTX 6000 Ada 48GB
# Architecture: 24 layers, 32 routed experts, top-4, no shared experts
# hidden=2880, intermediate=2880, fused expert weights (mlp.experts.down_proj)
# Ships as MXFP4 (~13GB) — abliteration must dequant to BF16 (~40GB).
#
# GPU notes (RTX 6000 Ada, sm_89):
#   - vLLM FA3 unavailable on Ada; falls back to FA2 automatically.
#   - BF16 model + KV cache + hidden states cache must fit in 48GB.
#   - max_memory pinned to 44GiB to leave headroom for activations/KV.
#   - Keep max_batch_size small; bottleneck is activation memory, not flops.
#
# MXFP4 handling (auto, do not override):
#   - engine.py auto-detects native MXFP4 and forces
#     `Mxfp4Config(dequantize=True)` so GptOssExperts.down_proj is exposed
#     as a standard 3-D nn.Parameter (32, 2880, 2880). Without dequant,
#     the experts are wrapped in Mxfp4GptOssExperts whose weights are
#     packed triton tensors that abliterix cannot edit.
#   - DO NOT install `kernels-community/gpt-oss-triton-kernels`; it is
#     unnecessary for the dequant path and only adds load time.
#   - Keep `quant_method = "none"` here — engine sees the model's own
#     quantization_config and forces the right Mxfp4Config.
#
# Steering strategy:
#   - steering_mode = "direct" → orthogonal projection on base weights
#     AND auto-triggers Expert-Granular Abliteration (EGA) on all 32
#     experts' fused down_proj (steering.py:244). Critical for MoE because
#     the refusal signal is distributed across experts, not concentrated.
#   - EGA axis fix: gpt-oss stores fused down_proj as
#     (experts, intermediate_in, hidden_out) — transposed vs standard MoE.
#     engine.py sets `_fused_down_proj_transposed=True` for gpt_oss so
#     _apply_ega_steering picks the correct projection branch (the
#     dimension equality 2880==2880 made shape-based detection ambiguous).
#   - weight_normalization = "full" → preserve row norms after projection
#     (matches Gemma 4 best practice for direct mode).

[model]
model_id = "openai/gpt-oss-20b"
dtype_fallback_order = ["bfloat16"]
quant_method = "none"
use_torch_compile = false
device_map = "auto"
trust_remote_code = true
max_memory = {0 = "44GiB"}

[inference]
batch_size = 0          # auto-tune
max_batch_size = 2      # conservative — BF16 20B leaves only ~8GB headroom on 48GB
max_gen_tokens = 150

[steering]
vector_method = "mean"
steering_mode = "direct"        # in-place weight edit + EGA on fused experts
decay_kernel = "linear"
orthogonal_projection = true
weight_normalization = "full"   # norm-preserving projection (Gemma 4 lesson)
# MoE: wider strength range (small intermediate=2880)
strength_range = [1.0, 10.0]

[optimization]
num_trials = 50
num_warmup_trials = 15
checkpoint_dir = "checkpoints_gpt_oss_20b"

[kl]
scale = 1.0
token_count = 3
target = 0.01
prune_threshold = 5.0

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3.1-flash-lite-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 6

[display]
print_responses = false
print_residual_geometry = false
plot_residuals = false

non_interactive = true

[benign_prompts]
dataset = "datasets/good_500"
split = "train[:400]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_500"
split = "train[:400]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_500"
split = "train[400:]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_500"
split = "train[400:]"
column = "prompt"
