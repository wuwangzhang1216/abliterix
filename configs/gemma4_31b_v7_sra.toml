# Gemma 4 31B — v7 SRA (Surgical Refusal Ablation)
# Goal: <10/100 refusals with minimal KL damage
#
# Strategy:
#   - SRA spectral cleaning isolates the refusal-only component by
#     projecting out 12 concept atoms (protected capabilities like
#     math, code, reasoning) from the refusal vector
#   - Especially effective for Gemma 4 which has strong capability
#     embeddings interleaved with refusal signals in its dual-attention layers
#   - Ridge alpha tuned lower than default to be more aggressive
#     about removing refusal signal
#   - Combined with discriminative layer selection to avoid touching
#     layers that don't discriminate harmful/benign

[model]
model_id = "google/gemma-4-31B-it"
dtype_fallback_order = ["bfloat16"]
quant_method = "none"
use_torch_compile = false
device_map = "auto"
max_memory = {0 = "76GiB"}

[inference]
batch_size = 0
max_batch_size = 4
max_gen_tokens = 100

[steering]
# SRA: Surgical Refusal Ablation with concept-guided spectral cleaning
vector_method = "sra"
sra_base_method = "mean"
sra_n_atoms = 12          # More atoms for 31B model (captures more capability directions)
sra_ridge_alpha = 0.005   # Lower ridge = more aggressive refusal removal

# Projected abliteration stacks with SRA for extra precision
projected_abliteration = true

# Winsorize
winsorize_vectors = true
winsorize_quantile = 0.995

# Discriminative layers
discriminative_layer_selection = true

# LoRA mode
steering_mode = "lora"

decay_kernel = "gaussian"
weight_normalization = "none"

# Qwen3.5-27B uses [1.0, 5.0] on same-class dense model
strength_range = [1.0, 5.0]

[optimization]
num_trials = 150
num_warmup_trials = 40
checkpoint_dir = "checkpoints_gemma4_31b_v7_sra"

[kl]
scale = 1.0
token_count = 3
target = 0.015
prune_threshold = 8.0

[detection]
llm_judge = true
llm_judge_batch_size = 10
llm_judge_concurrency = 35

[benign_prompts]
dataset = "datasets/good_500"
split = "train[:400]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_500"
split = "train[:400]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_500"
split = "train[400:]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_500"
split = "train[400:]"
column = "prompt"

[display]
print_responses = false
