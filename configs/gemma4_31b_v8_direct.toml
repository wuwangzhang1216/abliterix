# Gemma 4 31B — V8: aggressive direct editing with full attack surface
#
# V4 improvements applied to 31B dense:
#   - Q/K/V projections as steerable targets (5 components total)
#   - Norm preservation (weight_normalization = "pre")
#   - float32 projection precision
#   - Winsorize vectors
#   - Much wider strength range to push KL up toward 0.001
#   - Relaxed KL prune threshold
#   - 150 token generation for accurate refusal detection

[model]
model_id = "google/gemma-4-31B-it"
dtype_fallback_order = ["bfloat16"]
quant_method = "none"
use_torch_compile = false
device_map = "auto"
max_memory = {0 = "90GiB"}

[inference]
batch_size = 0
max_batch_size = 8
max_gen_tokens = 100

[steering]
steering_mode = "direct"
vector_method = "mean"
orthogonal_projection = true
winsorize_vectors = true
winsorize_quantile = 0.995
decay_kernel = "gaussian"
weight_normalization = "pre"

# Very wide strength range — current KL is ~0.0005, we need to push to ~0.001
# Higher strength = more aggressive refusal removal = higher KL
strength_range = [1.0, 6.0]

[optimization]
num_trials = 80
num_warmup_trials = 25
checkpoint_dir = "checkpoints_gemma4_31b_v8"

[kl]
scale = 1.0
token_count = 3
# Accept up to 0.001 KL — current trials are way too conservative
target = 0.001
prune_threshold = 50.0

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3-flash-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 35

[benign_prompts]
dataset = "datasets/good_1000"
split = "train[:400]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_1000"
split = "train[:400]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_1000"
split = "train[400:500]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_1000"
split = "train[400:500]"
column = "prompt"

[display]
print_responses = false
