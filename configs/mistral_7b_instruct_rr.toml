# GraySwanAI/Mistral-7B-Instruct-RR — Circuit Breakers defense (Zou et al. 2024)
# Base model: mistralai/Mistral-7B-Instruct-v0.2
#
# v2 recipe (after Llama-3-RR demonstrated full-strip + minimal config wins):
#   - Stage 1 lerp at λ=0.0 → bit-exact Mistral-7B-Instruct-v0.2 base weights
#   - Single-direction direct-mode abliteration, no iterative, linear kernel
#   - llm_judge=true (default), no keyword shortcut
# Hardware target: single RTX A6000 (48GB)

system_prompt = ""

[model]
model_id = "/workspace/mistral_rr_stripped"
dtype_fallback_order = ["bfloat16"]
quant_method = "none"
use_torch_compile = false
device_map = "auto"
trust_remote_code = false
max_memory = {0 = "46GiB"}

[inference]
batch_size = 0
max_batch_size = 32
max_gen_tokens = 150

[steering]
vector_method = "mean"
n_directions = 1
steering_mode = "direct"
projected_abliteration = true
discriminative_layer_selection = true
strength_range = [1.5, 6.0]
decay_kernel = "linear"

[iterative]
enabled = false

[optimization]
num_trials = 60
num_warmup_trials = 20
checkpoint_dir = "checkpoints_mistral_7b_rr"

[kl]
scale = 1.0
token_count = 1
target = 0.02
prune_threshold = 5.0

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3.1-flash-lite-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 6

[display]
print_responses = false
print_residual_geometry = true
