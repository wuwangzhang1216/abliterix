# MiniMax-M2.5 (MoE) — vLLM dual-engine config for 4× H100 80GB
# 256 experts (8 routed), 62 layers, hidden=3072, expert_dim=1536
# FP8: ~220GB weights → TP=4 → ~55GB/GPU, ~25GB headroom for KV cache + LoRA
#
# Architecture: HF Phase 1 (hidden states + steering vectors) → vLLM Phase 2
# (tensor-parallel generation with LoRA hot-swap).
#
# TP must divide num_kv_heads=8. Valid: 1, 2, 4, 8. TP=4 is the sweet spot.
#
# NOTE: MoE expert routing (n_suppress, router_bias) is NOT supported in
# vLLM mode — only LoRA weight steering is applied.

[model]
model_id = "MiniMaxAI/MiniMax-M2.5"
dtype_fallback_order = ["auto"]
quant_method = "fp8"
# MiniMax requires transformers 4.57.x (custom code), which predates the
# FP8 kernel fixes in 5.2.  On H100 the native FP8 kernels work fine with
# 4.57 — skip the slow bf16 dequant workaround.
skip_fp8_dequant = true
attn_implementation = "flash_attention_2"
use_torch_compile = false
device_map = "auto"
trust_remote_code = true
# Phase 1 (HF): spread across 4× H100 80GB
max_memory = {0 = "76GiB", 1 = "76GiB", 2 = "76GiB", 3 = "76GiB"}
# Phase 2 (vLLM): tensor parallelism across all 4 GPUs
backend = "vllm"
tensor_parallel_size = 4
gpu_memory_utilization = 0.93
# EP for MoE expert layers — distributes experts across GPUs
enable_expert_parallel = true
# Chunked prefill overlaps prefill/decode for better GPU utilization
enable_chunked_prefill = true
# CUDA graphs for ~15% throughput boost (stable with vLLM >= 0.8)
enforce_eager = false
# FP8 KV cache: 2x KV capacity on H100 with negligible quality loss
kv_cache_dtype = "fp8_e4m3"

[inference]
batch_size = 0
# MoE active params = 10B — much smaller than total 229B. GPU can handle
# larger batches for continuous batching throughput.
max_batch_size = 16
max_gen_tokens = 150

[steering]
vector_method = "mean"
decay_kernel = "linear"
orthogonal_projection = true
weight_normalization = "none"
# MoE: wider weight range (consistent with Qwen3.5-122B/397B)
strength_range = [1.0, 10.0]

[optimization]
num_trials = 50
num_warmup_trials = 10
checkpoint_dir = "checkpoints_minimax_m25_vllm"

[kl]
scale = 1.0
token_count = 3
target = 0.01
prune_threshold = 5.0

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3.1-flash-lite-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 10

[display]
print_responses = false
print_residual_geometry = false
plot_residuals = false

non_interactive = true

[benign_prompts]
dataset = "datasets/good_1000"
split = "train[:400]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_1000"
split = "train[:400]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_1000"
split = "train[400:500]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_1000"
split = "train[400:500]"
column = "prompt"
