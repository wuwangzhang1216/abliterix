# Gemma 4 E4B-it — direct steering on single RTX 6000 Ada (48GB)
#
# Model: google/gemma-4-E4B-it
#   - Multimodal Gemma4ForConditionalGeneration (text + vision + audio)
#   - Text decoder: 42 layers, hidden=2560, intermediate=10240
#   - Dense (enable_moe_block=False)
#   - use_double_wide_mlp=False (different from E2B!)
#   - num_kv_shared_layers=18 (KV sharing across layers)
#   - num_attention_heads=8, num_key_value_heads=2
#   - PLE + 4× RMSNorm → must use direct weight editing (LoRA fails on this family)
#   - ~8B BF16 params (+ vision/audio encoders)
#
# Hardware: single RTX 6000 Ada 48GB
#   - BF16 weights ~16-18GB incl. vision/audio
#   - batch=64 generation comfortably fits with headroom

[model]
model_id = "google/gemma-4-E4B-it"
dtype_fallback_order = ["bfloat16"]
quant_method = "none"
use_torch_compile = false
device_map = "auto"
max_memory = {0 = "46GiB"}

[inference]
batch_size = 0
max_batch_size = 64
max_gen_tokens = 100

[steering]
steering_mode = "direct"
vector_method = "mean"
orthogonal_projection = true
winsorize_vectors = true
winsorize_quantile = 0.995
decay_kernel = "gaussian"
weight_normalization = "pre"

# 42 layers + slightly bigger model than E2B → keep similar conservative range.
# E2B converged best around 1-3 strength on most components.
strength_range = [0.5, 4.0]

[optimization]
num_trials = 100
num_warmup_trials = 30
checkpoint_dir = "checkpoints_gemma4_e4b"

[kl]
scale = 1.0
token_count = 3
# E2B sat at 0.0004 KL with 9/100; E4B is bigger so headroom is similar.
target = 0.005
prune_threshold = 50.0

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3-flash-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 35

[benign_prompts]
dataset = "datasets/good_1000"
split = "train[:400]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_1000"
split = "train[:400]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_1000"
split = "train[400:500]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_1000"
split = "train[400:500]"
column = "prompt"

[display]
print_responses = false
