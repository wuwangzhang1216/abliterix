# MiniMax-M2.5 (MoE) steering config — FP8 native
# 256 experts (8 routed, no shared expert), 62 layers, hidden=3072, expert_dim=1536
# FP8: ~230GB weights — fits 3× RTX PRO 6000 96GB (288GB total)
#
# Architecture: MiniMaxM2ForCausalLM (custom code, trust_remote_code=true)
# MoE module: block_sparse_moe (Phi-3.5-MoE naming convention)
# Expert linears: w1 (gate_proj), w2 (down_proj), w3 (up_proj)
# Routing: sigmoid scoring with e_score_correction_bias (DeepSeek-style)
#
# NOTE: skip_fp8_dequant=true uses native FP8 GEMM instead of the slow
# Python-level bf16 monkey-patching workaround. Requires SM89+ GPU with
# a compatible transformers version (4.57.x).

[model]
model_id = "MiniMaxAI/MiniMax-M2.5"
dtype_fallback_order = ["auto"]
quant_method = "fp8"
# skip_fp8_dequant: auto-detect (H100+ with transformers >= 5.2 → native FP8)
attn_implementation = "flash_attention_2"
use_torch_compile = false
device_map = "auto"
trust_remote_code = true
# 3× RTX PRO 6000 96GB — leave ~4GB/GPU headroom
max_memory = {0 = "92GiB", 1 = "92GiB", 2 = "92GiB"}

[inference]
batch_size = 0
max_batch_size = 8
max_gen_tokens = 150

[steering]
vector_method = "mean"
decay_kernel = "linear"
orthogonal_projection = true
weight_normalization = "none"
# MoE: wider weight range (consistent with Qwen3.5-122B/397B)
strength_range = [1.0, 10.0]

[optimization]
num_trials = 50
num_warmup_trials = 10
checkpoint_dir = "checkpoints_minimax_m25"

[kl]
scale = 1.0
token_count = 3
target = 0.01
prune_threshold = 5.0

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3.1-flash-lite-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 10

[display]
print_responses = false
print_residual_geometry = false
plot_residuals = false

non_interactive = true

[benign_prompts]
dataset = "datasets/good_500"
split = "train[:400]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_500"
split = "train[:400]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_500"
split = "train[400:]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_500"
split = "train[400:]"
column = "prompt"
