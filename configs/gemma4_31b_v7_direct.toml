# Gemma 4 31B — Direct Weight Editing (norm-preserving orthogonal projection)
#
# Gemma 4's double-norm architecture (4 RMSNorm/layer) + PLE makes LoRA and
# hook-based steering completely ineffective. Direct weight modification is
# the only proven approach (TrevorS, 199-biotechnologies, grimjim).
#
# Strategy:
#   - steering_mode = "direct": W_new = W - s*(W@d)⊗d with norm preservation
#   - Per-layer vectors (vector_scope = per layer via Optuna)
#   - orthogonal_projection = true to isolate refusal-only signal
#   - Mean method first (proven by 199-biotechnologies on Gemma 4)
#   - Strength [0.5, 2.0]: direct editing is much more potent than LoRA
#   - Refusal peaks at layer 59 (final layer) per external research

[model]
model_id = "google/gemma-4-31B-it"
dtype_fallback_order = ["bfloat16"]
quant_method = "none"
use_torch_compile = false
device_map = "auto"
max_memory = {0 = "76GiB"}

[inference]
batch_size = 0
max_batch_size = 8
max_gen_tokens = 50

[steering]
# Direct weight editing — bypasses LoRA, modifies base weights in-place
steering_mode = "direct"

# Mean difference is proven on Gemma 4 (199-biotechnologies used exactly this)
vector_method = "mean"

# Orthogonal projection: isolate refusal direction from harmless signals
orthogonal_projection = true

decay_kernel = "gaussian"
weight_normalization = "none"

# Direct editing is much more potent — lower range than LoRA
strength_range = [0.5, 2.0]

[optimization]
num_trials = 80
num_warmup_trials = 25
checkpoint_dir = "checkpoints_gemma4_31b_v7_direct"

[kl]
scale = 1.0
token_count = 3
target = 0.02
prune_threshold = 8.0

[detection]
llm_judge = true
llm_judge_batch_size = 10
llm_judge_concurrency = 35

[benign_prompts]
dataset = "mlabonne/harmless_alpaca"
split = "train[:400]"
column = "text"

[target_prompts]
dataset = "mlabonne/harmful_behaviors"
split = "train[:400]"
column = "text"

[benign_eval_prompts]
dataset = "mlabonne/harmless_alpaca"
split = "test[:100]"
column = "text"

[target_eval_prompts]
dataset = "mlabonne/harmful_behaviors"
split = "test[:100]"
column = "text"

[display]
print_responses = false
