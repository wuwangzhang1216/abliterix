# Gemma 4 31B — v7 Quick Fix (minimal changes from v6)
# Goal: validate that strength_range + orthogonal_projection alone fix most of the 48% problem
#
# Only 3 changes from v6:
#   1. strength_range [1.0, 2.5] → [1.0, 5.0]  (match Qwen3.5-27B proven range)
#   2. orthogonal_projection = true               (all successful Qwen dense configs use this)
#   3. num_trials 75 → 120                        (more exploration budget)
#
# If this alone drops to ~15-20%, the remaining gap is vector quality.
# If still >30%, need cosmic/OT/SRA.

[model]
model_id = "google/gemma-4-31B-it"
dtype_fallback_order = ["bfloat16"]
quant_method = "none"
use_torch_compile = false
device_map = "auto"
max_memory = {0 = "76GiB"}

[inference]
batch_size = 0
max_batch_size = 4
max_gen_tokens = 100

[steering]
vector_method = "mean"
decay_kernel = "linear"
orthogonal_projection = true      # Changed: was false
strength_range = [1.0, 5.0]      # Changed: was [1.0, 2.5]

[optimization]
num_trials = 120                  # Changed: was 75
num_warmup_trials = 30
checkpoint_dir = "checkpoints_gemma4_31b_v7_quick"

[kl]
scale = 1.0
token_count = 3
target = 0.01
prune_threshold = 5.0

[detection]
llm_judge = true
llm_judge_batch_size = 10
llm_judge_concurrency = 35

[benign_prompts]
dataset = "datasets/good_500"
split = "train[:400]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_500"
split = "train[:400]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_500"
split = "train[400:]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_500"
split = "train[400:]"
column = "prompt"

[display]
print_responses = false
