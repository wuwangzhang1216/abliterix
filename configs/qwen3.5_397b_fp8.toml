# Qwen3.5-397B-A17B (MoE) steering config — FP8 (pre-quantized)
# 512 experts (10 routed + 1 shared), 60 layers, hidden=4096, expert_dim=1024
# FP8: ~397GB weights — fits 6× H100 80GB (480GB) with headroom for activations
# REQUIRES: Compute Capability >= 8.9 (H100/H200, SM89+). A100 is NOT supported.

[model]
model_id = "Qwen/Qwen3.5-397B-A17B-FP8"
dtype_fallback_order = ["auto"]
quant_method = "fp8"
# Fix Qwen3.5 MoE weight_scale_inv 1D/2D shape mismatch (transformers #42915)
fp8_weight_block_size = [128, 128]
use_torch_compile = false
device_map = "auto"
trust_remote_code = true
# 6× H100 80GB — leave ~4GB/GPU for activations, KV cache, MoE routing buffers
max_memory = {0 = "76GiB", 1 = "76GiB", 2 = "76GiB", 3 = "76GiB", 4 = "76GiB", 5 = "76GiB"}

[inference]
batch_size = 0
# MoE: only 17B active params per token — can handle batch_size=4 on 6× H100
max_batch_size = 4
max_gen_tokens = 50

[steering]
vector_method = "mean"
decay_kernel = "linear"
orthogonal_projection = true
weight_normalization = "none"
# MoE: wider weight range (matches 122B/397B BNB configs)
strength_range = [1.0, 10.0]

[optimization]
num_trials = 50
num_warmup_trials = 10
checkpoint_dir = "checkpoints_397b_fp8"

[kl]
scale = 1.0
token_count = 3
target = 0.01
prune_threshold = 5.0

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3.1-flash-lite-preview"
llm_judge_batch_size = 25
llm_judge_concurrency = 25

[display]
print_responses = false
print_residual_geometry = false
plot_residuals = false

non_interactive = true

[benign_prompts]
dataset = "datasets/good_500"
split = "train[:400]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_500"
split = "train[:400]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_500"
split = "train[400:]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_500"
split = "train[400:]"
column = "prompt"
