# MiniMax-M2.7 (MoE) — SGLang dual-engine config for 4x H100 80GB
# 256 experts (8 routed), 62 layers, hidden=3072, expert_dim=1536
# FP8: ~220GB weights -> TP=4 -> ~55GB/GPU, ~25GB headroom for KV cache + LoRA
#
# SGLang advantages over vLLM for this workload:
#   - MoE LoRA with fused Triton kernels (vLLM lacks fused MoE LoRA)
#   - LoRA weight loading overlap: ~78% TTFT reduction on adapter hot-swap
#   - Efficient scheduler even without RadixAttention
#
# NOTE: RadixAttention (prefix caching) is incompatible with LoRA and is
# automatically disabled.  Despite this, SGLang remains competitive.
#
# Requires: SGLang >= 0.5.10 (MoE LoRA support)
#
# Architecture: HF Phase 1 (hidden states + steering vectors) -> SGLang Phase 2
# (tensor-parallel generation with LoRA hot-swap).

[model]
model_id = "MiniMaxAI/MiniMax-M2.7"
dtype_fallback_order = ["auto"]
quant_method = "fp8"
skip_fp8_dequant = true
attn_implementation = "flash_attention_2"
use_torch_compile = false
device_map = "auto"
trust_remote_code = true
# Phase 1 (HF): spread across 4x H100 80GB
max_memory = {0 = "76GiB", 1 = "76GiB", 2 = "76GiB", 3 = "76GiB"}
# Phase 2 (SGLang): tensor parallelism + RadixAttention
backend = "sglang"
tensor_parallel_size = 4
# H100 80GB: push memory hard. Model weights ~57GB/GPU, leaving 23GB for KV+LoRA.
gpu_memory_utilization = 0.96
enable_chunked_prefill = true
enforce_eager = false
# FP8 KV cache: 4x capacity vs fp16 on H100
kv_cache_dtype = "fp8_e4m3"
# CRITICAL: Cap context length from 196K → 4096 (abliteration uses <2K).
# SGLang maps this to context_length.
max_model_len = 4096
# Continuous batching width (SGLang: max_running_requests).
max_num_seqs = 256

[inference]
batch_size = 0
max_batch_size = 256
# Refusal detection only needs ~30-50 tokens; cap at 64.
max_gen_tokens = 64

[steering]
vector_method = "mean"
decay_kernel = "linear"
orthogonal_projection = true
weight_normalization = "none"
strength_range = [1.0, 10.0]
# Q/K/V steering adds 12 search dimensions for near-zero improvement on MoE.
# Validated on Gemma 4 E4B (21 dims → 9 dims, TPE converges properly).
disabled_components = ["attn.q_proj", "attn.k_proj", "attn.v_proj"]
# Focus search: EGA on expert down_proj (wide) + attention output (moderate)
[steering.component_strength_ranges]
"mlp.down_proj" = [2.0, 10.0]
"attn.o_proj" = [1.0, 5.0]

[optimization]
num_trials = 50
num_warmup_trials = 10
checkpoint_dir = "checkpoints_minimax_m27_sglang"

[kl]
scale = 1.0
token_count = 3
target = 0.01
prune_threshold = 3.0

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3.1-flash-lite-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 10

[display]
print_responses = false
print_residual_geometry = false
plot_residuals = false

non_interactive = true

[benign_prompts]
dataset = "datasets/good_1000"
split = "train[:400]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_1000"
split = "train[:400]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_1000"
split = "train[400:500]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_1000"
split = "train[400:500]"
column = "prompt"
